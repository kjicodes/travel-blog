<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Roam&Write</title>
    {% block styles %}
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    {{ bootstrap.load_css() }}
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}"/>

    {% endblock %}

</head>
<body>
    <div class="container">
        <div class="d-flex  justify-content-center">
            <a href="{{ url_for('get_all_posts') }}"
               class="d-flex align-items-center  me-md-auto link-body-emphasis text-decoration-none">
                <svg xmlns="http://www.w3.org/2000/svg" width="40" height="36" fill="currentColor"
                     class="bi bi-luggage-fill" viewBox="0 0 16 16">
                    <path d="M2 1.5a.5.5 0 0 1 .5-.5h3a.5.5 0 0 1 .5.5V5h.5A1.5 1.5 0 0 1 8 6.5V7H7v-.5a.5.5 0 0 0-.5-.5h-5a.5.5 0 0 0-.5.5v7a.5.5 0 0 0 .5.5H4v1H2.5v.25a.75.75 0 0 1-1.5 0v-.335A1.5 1.5 0 0 1 0 13.5v-7A1.5 1.5 0 0 1 1.5 5H2zM3 5h2V2H3z"/>
                    <path d="M2.5 7a.5.5 0 0 1 .5.5v5a.5.5 0 0 1-1 0v-5a.5.5 0 0 1 .5-.5m10 1v-.5A1.5 1.5 0 0 0 11 6h-1a1.5 1.5 0 0 0-1.5 1.5V8H8v8h5V8zM10 7h1a.5.5 0 0 1 .5.5V8h-2v-.5A.5.5 0 0 1 10 7M5 9.5A1.5 1.5 0 0 1 6.5 8H7v8h-.5A1.5 1.5 0 0 1 5 14.5zm9 6.5V8h.5A1.5 1.5 0 0 1 16 9.5v5a1.5 1.5 0 0 1-1.5 1.5z"/>
                </svg>
                <div class="px-2"></div>
                <span id="logo-name">Roam&Write</span>
            </a>
            <ul class="nav nav-pills">
                <li class="nav-item">
                    <a href="{{ url_for('get_all_posts') }}" class="nav-link text-dark" aria-current="page">Home</a>
                </li>
                <li class="nav-item">
                    <a href="#" class="nav-link text-dark">About the Owner</a>
                </li>
                <li class="nav-item">
                    <a href="#" class="nav-link text-dark">Reach Out</a>
                </li>
                {% if current_user.is_authenticated %}
                <li class="nav-item">
                    <a href="{{ url_for('create_post') }}" class="nav-link text-dark">Add Post</a>
                </li>
                <li class="nav-item">
                    <a href="{{ url_for('logout') }}" class="nav-link active text-dark bg-light">Logout</a>
                </li>
                {% else %}
                <li class="nav-item">
                    <a href="{{ url_for('register') }}" class="nav-link text-dark">Register</a>
                </li>
                <li class="nav-item">
                    <a href="{{ url_for('login') }}" class="nav-link active text-dark bg-light">Login</a>
                </li>
                {% endif %}
            </ul>
        </div>
    </div>
